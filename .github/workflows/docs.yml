name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    env:
      REPOSITORY_NAME: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Build and transform DocC site
        run: |
          set -euo pipefail

          docc_cmd="$(xcrun --find docc)"
          output_path="docs-site"

          # Convert the DocC catalog directly — no xcodebuild, no symbol graphs.
          if [[ "${REPOSITORY_NAME}" == *.github.io ]]; then
            "${docc_cmd}" convert HealthLens/HealthLens.docc \
              --output-path "${output_path}" \
              --transform-for-static-hosting
          else
            "${docc_cmd}" convert HealthLens/HealthLens.docc \
              --output-path "${output_path}" \
              --transform-for-static-hosting \
              --hosting-base-path "${REPOSITORY_NAME}"
          fi

          touch "${output_path}/.nojekyll"

          # Redirect root to the documentation landing page.
          cat > "${output_path}/index.html" <<REDIRECT
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=/${REPOSITORY_NAME}/documentation/healthlens"></head>
          </html>
          REDIRECT

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
